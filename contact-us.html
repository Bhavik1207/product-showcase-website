<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  .contact-container {
    padding: 150px 5rem 100px;
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .contact-header {
    margin-bottom: 3rem;
  }
  .contact-form {
    background: rgba(13,17,32, 0.4);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(91,141,238,.2);
    padding: 4rem;
    border-radius: 12px;
    box-shadow: 0 0 80px rgba(0,0,0,.5), inset 0 0 40px rgba(91,141,238,.05);
    text-align: left;
  }
  .form-group {
    margin-bottom: 2rem;
    position: relative;
  }
  .form-label {
    display: block;
    font-size: .75rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: .8rem;
  }
  .form-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--mist);
    color: var(--chalk);
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    padding: .5rem 0;
    transition: border-color .3s, box-shadow .3s;
    cursor: none;
  }
  .form-input:focus {
    outline: none;
    border-bottom-color: var(--glow2);
    box-shadow: 0 10px 10px -10px var(--glow2);
  }
  textarea.form-input {
    resize: none;
    height: 100px;
  }
  .submit-btn {
    width: 100%;
    padding: 1.2rem;
    background: linear-gradient(135deg, var(--glow1), var(--glow2));
    color: white;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    cursor: none;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(166,108,255,.3);
    transition: box-shadow .3s, transform .2s;
    margin-top: 1rem;
  }
  .submit-btn:hover {
    box-shadow: 0 0 60px rgba(166,108,255,.6);
    transform: translateY(-2px);
  }
</style>
  <script type="module" crossorigin src="/product-showcase-website/assets/main-CH3WDGmh.js"></script>
  <link rel="stylesheet" crossorigin href="/product-showcase-website/assets/main-DrOA96zE.css">
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Ambient blobs -->
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-3"></div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-logo">AUR<span>A</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse-collection.html">Collection</a></li>
    <li><a href="learn-more.html">Learn</a></li>
    <li><a href="contact-us.html" style="color:var(--chalk)">Contact</a></li>
  </ul>
  <button class="nav-cta" onclick="window.location.href='add-to-cart.html'">Cart (<span class="cart-count">0</span>)</button>
</nav>

<section class="contact-container">
  <div class="contact-header">
    <div class="s-eyebrow" style="justify-content:center; margin-bottom: 1.5rem;">Connect</div>
    <h1 class="hero-title" style="font-size: 3.5rem;">REACH <em>OUT</em></h1>
  </div>
  
  <div class="contact-form">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" placeholder="Your name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-input" placeholder="How can we help you?"></textarea>
    </div>
    <button class="submit-btn">Send Message</button>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">AUR<span>A</span></div>
  <div class="footer-links">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="contact-us.html" style="color:var(--chalk)">Contact</a>
    <a href="#">Instagram</a>
  </div>
  <div class="footer-copy">© 2026 AURA — All rights reserved</div>
</footer>

</body>
</html>
